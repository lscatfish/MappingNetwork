target_net: cnn2
training_strategy: slvt
latent_dim: 2048
batch_size: 128
epochs: 20
seed: 42
optimizer: adamw
lr: 0.01
weight_decay: 0.00001
scheduler: cosine_annealing
min_lr: 0.00001
alpha: 0.01
lrd:
  enabled: auto
  default_rank: 10
  layer_ranks:
    fc1: 10
lambda_st_init: 0.01
lambda_sm_init: 0.01
lambda_al_init: 0.01
sigma_noise: 0.001
device: cuda
log_interval: 100
checkpoint_dir: checkpoints
save_interval: 3
