target_net: cnn1
training_strategy: slvt
latent_dim: 2072
batch_size: 64
epochs: 30
seed: 42
optimizer: adamw
lr: 0.001
weight_decay: 0.0001
scheduler: cosine_annealing
min_lr: 0.00001
alpha: 0.01
lambda_st_init: 0.1
lambda_sm_init: 0.1
lambda_al_init: 0.1
sigma_noise: 0.01
device: cuda
log_interval: 100
checkpoint_dir: checkpoints
save_interval: 1
